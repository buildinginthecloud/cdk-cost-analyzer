name: e2e
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.18.1
      - name: Install dependencies
        run: npm install
      - name: Build cdk-cost-analyzer
        run: npm run build
      - name: Install single-stack dependencies
        run: npm ci
        working-directory: examples/single-stack
      - name: Synthesize single-stack
        run: npm run synth
        working-directory: examples/single-stack
      - name: Run cdk-cost-analyzer on single-stack (text output)
        run: node ../../dist/cli/index.js analyze cdk.out/SingleStackExample.template.json --format text
        working-directory: examples/single-stack
      - name: Run cdk-cost-analyzer on single-stack (json output)
        run: node ../../dist/cli/index.js analyze cdk.out/SingleStackExample.template.json --format json > cost-report.json
        working-directory: examples/single-stack
      - name: Validate single-stack JSON output
        run: |-
          if [ ! -f cost-report.json ]; then
            echo "Error: cost-report.json not found"
            exit 1
          fi
          if [ ! -s cost-report.json ]; then
            echo "Error: cost-report.json is empty"
            exit 1
          fi
          echo "Single-stack JSON output validated"
          cat cost-report.json
        working-directory: examples/single-stack
      - name: Install multi-stack dependencies
        run: npm ci
        working-directory: examples/multi-stack
      - name: Synthesize multi-stack
        run: npm run synth
        working-directory: examples/multi-stack
      - name: Run cdk-cost-analyzer on multi-stack NetworkingStack (text output)
        run: node ../../dist/cli/index.js analyze cdk.out/NetworkingStack.template.json --format text
        working-directory: examples/multi-stack
      - name: Run cdk-cost-analyzer on multi-stack NetworkingStack (json output)
        run: node ../../dist/cli/index.js analyze cdk.out/NetworkingStack.template.json --format json > cost-report.json
        working-directory: examples/multi-stack
      - name: Validate multi-stack JSON output
        run: |-
          if [ ! -f cost-report.json ]; then
            echo "Error: cost-report.json not found"
            exit 1
          fi
          if [ ! -s cost-report.json ]; then
            echo "Error: cost-report.json is empty"
            exit 1
          fi
          echo "Multi-stack JSON output validated"
          cat cost-report.json
        working-directory: examples/multi-stack
  cost-report:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      AWS_REGION: eu-central-1
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.18.1
      - name: Install dependencies
        run: npm install
      - name: Build cdk-cost-analyzer
        run: npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-cost-analyzer
          aws-region: ${{ env.AWS_REGION }}
      - name: Run cost analysis with recommendations (markdown)
        run: node dist/cli/index.js analyze examples/recommendations-demo.json --recommendations --format markdown --region $AWS_REGION > cost-report.md 2>&1 || true
      - name: Post cost report as PR comment
        uses: actions/github-script@v7
        with:
          script: |-
            const fs = require('fs');
            let report = '';
            if (fs.existsSync('cost-report.md') && fs.statSync('cost-report.md').size > 0) {
              report = fs.readFileSync('cost-report.md', 'utf8');
            } else {
              report = '> Cost analysis report could not be generated. Check the workflow logs for details.';
            }

            const marker = '<!-- cdk-cost-analyzer-report -->';
            const body = marker + '\n' + report + '\n\n---\n*Generated by [CDK Cost Analyzer](https://github.com/buildinginthecloud/cdk-cost-analyzer) e2e workflow*';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
